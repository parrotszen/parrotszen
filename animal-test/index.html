        <button class="btn-start" onclick="startTest()">테스트 시작하기 →</button>
      </div>`;
  } else if (state.screen === 'quiz') {
    const q = questions[state.currentQ];
    const progress = Math.round(((state.currentQ) / questions.length) * 100);
    const selectedIdx = state.answers[state.currentQ] !== undefined ? state.answers[state.currentQ] : -1;
    app.innerHTML = `
      <div class="progress-wrap">
        <div class="progress-label">${state.currentQ + 1} / ${questions.length}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      </div>
      <div class="card">
        <div class="q-num">Q${state.currentQ + 1}</div>
        <div class="q-text">${q.text}</div>
        <div class="options">
          ${q.options.map((o, i) => `
            <button class="option-btn ${selectedIdx===i?'selected':''}" onclick="selectOption(${i})">
              <span>${o.text}</span>
            </button>`).join('')}
        </div>
        <div class="nav-row">
          ${state.currentQ > 0 ? `<button class="btn-back" onclick="goBack()">← 이전</button>` : '<div></div>'}
          <button class="btn-next" onclick="goNext()" ${selectedIdx===-1?'disabled':''}>
            ${state.currentQ < questions.length-1 ? '다음 →' : '결과 보기 🎉'}
          </button>
        </div>
      </div>`;
  } else if (state.screen === 'result') {
    const key = getResult();
    const a = animals[key];
    app.innerHTML = `
      <div class="result-card">
        <span class="result-emoji">${a.emoji}</span>
        <div class="result-label">당신의 동물 유형</div>
        <div class="result-title">${a.name}</div>
        <div class="result-label" style="color:#888;font-size:0.95rem;font-weight:400;margin-bottom:16px;">${a.subtitle}</div>
        <div class="result-tags">${a.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
        <div class="result-desc">${a.desc}</div>
        <div class="result-friends">
          <h3>✨ 잘 맞는 유형</h3>
          <div class="friend-row">${a.friends.map(f=>`<span class="friend-chip">${f}</span>`).join('')}</div>
        </div>
        <button class="btn-restart" onclick="restart()">🔄 다시 테스트하기</button>
      </div>`;
  }
}

function startTest() {
  state.screen = 'quiz';
  state.currentQ = 0;
  render();
}

function selectOption(idx) {
  const q = questions[state.currentQ];
  // Remove previous score for this question
  if (state.answers[state.currentQ] !== undefined) {
    const prev = q.options[state.answers[state.currentQ]].scores;
    for (const k in prev) state.scores[k] -= prev[k];
  }
  // Add new score
  const cur = q.options[idx].scores;
  for (const k in cur) state.scores[k] += cur[k];
  state.answers[state.currentQ] = idx;
  render();
}

function goNext() {
  if (state.answers[state.currentQ] === undefined) return;
  if (state.currentQ < questions.length - 1) {
    state.currentQ++;
    render();
  } else {
    state.screen = 'result';
    render();
  }
}

function goBack() {
  if (state.currentQ > 0) {
    state.currentQ--;
    render();
  }
}

function restart() {
  state = { screen: 'intro', currentQ: 0, answers: [], scores: { lion:0, fox:0, otter:0, owl:0, bear:0, cat:0, wolf:0, rabbit:0 } };
  render();
}

render();
</script>
</body>
</html>
