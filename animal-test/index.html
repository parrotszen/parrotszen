app.innerHTML='<div class="rc"><span class="re">'+a.emoji+'</span><div class="rl">당신의 동물 유형</div><div class="rt">'+a.name+'</div><div class="rs">'+a.sub+'</div><div class="rtags">'+tags+'</div><div class="rd">'+a.desc+'</div><div class="rf"><h3>✨ 잘 맞는 유형</h3><div class="fr">'+fr+'</div></div><button class="br" onclick="restart()">🔄 다시 테스트하기</button></div>';
}}
function start(){st.scr='quiz';st.q=0;render();}
function pick(i){
var q=Q[st.q];
if(st.ans[st.q]!==undefined){var p=q.o[st.ans[st.q]].s;Object.keys(p).forEach(function(k){st.sc[k]-=p[k];});}
var c=q.o[i].s;Object.keys(c).forEach(function(k){st.sc[k]+=c[k];});
st.ans[st.q]=i;render();
}
function next(){if(st.ans[st.q]===undefined)return;if(st.q<Q.length-1){st.q++;render();}else{st.scr='result';render();}}
function back(){if(st.q>0){st.q--;render();}}
function restart(){st={scr:'intro',q:0,ans:[],sc:{lion:0,fox:0,otter:0,owl:0,bear:0,cat:0,wolf:0,rabbit:0}};render();}
render();
</script>
